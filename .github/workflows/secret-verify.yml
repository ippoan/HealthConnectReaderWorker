name: Verify GCP Secrets

# Worker (`wrangler.jsonc` の `secrets.required`) が宣言する secret が
# GCP Secret Manager に backup されているか CI で検証する caller。
# secrets-inventory の同名 workflow と同じ pattern (Refs
# ippoan/secrets-inventory#21 / #23 / #32)。

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # WIF OIDC token mint 用

jobs:
  verify:
    if: |
      vars.GCP_WIF_PROVIDER != '' &&
      vars.GCP_WIF_SERVICE_ACCOUNT_STAGING != ''
    uses: ippoan/ci-workflows/.github/workflows/secret-verify-gcp.yml@main
    with:
      project: cloudsql-sv
      repo_type: worker
      workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
      service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT_STAGING }}
      apply_labels: true
